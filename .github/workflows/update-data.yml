name: Weekly Health Data Update

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 오전 9시 (KST = UTC+9, 즉 UTC 00:00)
  workflow_dispatch:        # 수동 실행 버튼도 활성화

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: pip install requests

      - name: 🚀 데이터 수집 실행
        env:
          KDCA_API_KEY: ${{ secrets.KDCA_API_KEY }}
        run: python scripts/fetch_data.py

      - name: 💾 latest.json 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "chore: 주간 데이터 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
